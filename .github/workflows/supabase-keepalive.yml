name: Supabase keep-alive (secondary)

# WHY THIS EXISTS
#   The LLYLI backend runs on the Supabase free tier, which pauses any project
#   whose database sees insufficient activity over a rolling 7-day window.
#   Supabase's bar (docs: platform/free-project-pausing) is:
#       "a few user requests to the database each day over the previous week"
#   The original 2x/week single-ping version of this file still earned a pause
#   warning on 2026-07-21 even though every run returned HTTP 200. Hence DAILY,
#   with several distinct queries per run.
#
#   This is the SECONDARY pinger. The primary lives in the private ksimons29/
#   llyli-ios repo on a 12-hour offset. Two independent schedules mean one
#   dropped or disabled run can never open a 7-day gap.
#
# THE 60-DAY TRAP
#   GitHub auto-disables scheduled workflows in PUBLIC repos after 60 days of
#   no repository activity -- which is exactly what would have happened here
#   around 2026-09-10. The weekly heartbeat commit below counts as repository
#   activity and keeps the schedule alive indefinitely. The primary pinger is
#   in a private repo, which is exempt from this rule entirely.
#
# The anon key is public by design -- it ships inside the iOS app binary and is
# constrained by RLS. feature_flags is the only anon-readable table.

on:
  schedule:
    # 19:43 UTC daily -- ~12h offset from the primary, and off the hour because
    # GitHub queues scheduled jobs at :00 and drops them under load.
    - cron: "43 19 * * *"
  workflow_dispatch:
    inputs:
      force_heartbeat:
        description: "Run the heartbeat commit even if today isn't Monday (verifies push perms)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Query the database several times (clears the activity threshold)
        run: |
          ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJseW1wemVqd2JlemphanBldmRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg1NTU4NzksImV4cCI6MjA4NDEzMTg3OX0.xfvBUDdxwhTvZuISjjyCde04ASHqeGtlRFsZB57tvNA"
          BASE="https://blympzejwbezjajpevdc.supabase.co/rest/v1"

          QUERIES=(
            "feature_flags?select=key&limit=1"
            "feature_flags?select=key,enabled&enabled=eq.true"
            "feature_flags?select=key,rollout_percentage&order=key.asc&limit=5"
            "feature_flags?select=key&enabled=eq.false&limit=10"
            "feature_flags?select=key,description&limit=3"
          )

          FAILED=0
          for q in "${QUERIES[@]}"; do
            HTTP=$(curl -s -o /tmp/body -w "%{http_code}" --max-time 30 \
              -H "apikey: ${ANON_KEY}" \
              -H "Authorization: Bearer ${ANON_KEY}" \
              "${BASE}/${q}")
            echo "HTTP ${HTTP}  ${q}  -> $(head -c 120 /tmp/body)"
            if [ "${HTTP}" != "200" ]; then FAILED=1; fi
            sleep 3
          done

          if [ "${FAILED}" != "0" ]; then
            echo "::error::Supabase keep-alive failed -- the project may be paused or RLS changed."
            exit 1
          fi
          echo "Keep-alive OK: ${#QUERIES[@]} database queries served."

      - name: Weekly heartbeat commit (keeps GitHub from disabling this cron)
        env:
          FORCE: ${{ inputs.force_heartbeat }}
        run: |
          # Only on Mondays -- one commit a week is ample to reset the 60-day
          # inactivity clock without flooding the history.
          if [ "$(date -u +%u)" != "1" ] && [ "${FORCE}" != "true" ]; then
            echo "Not Monday (UTC day $(date -u +%u)) -- skipping heartbeat commit."
            exit 0
          fi
          date -u +"Supabase keep-alive last heartbeat: %Y-%m-%dT%H:%M:%SZ" > .github/keepalive-heartbeat.txt
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive-heartbeat.txt
          git diff --staged --quiet && { echo "No change to commit."; exit 0; }
          git commit -m "chore: supabase keep-alive heartbeat"
          git push
